.note h1{font-size:18px;margin:0 0 4px;font-weight:800}
.note p{margin:2px 0;font-size:13px;color:#aeb9bf}.note b{color:#7fe7cf}
.pill{display:inline-block;margin-top:8px;padding:5px 12px;border:1px solid rgba(127,231,207,.4);border-radius:999px;font-size:12px;color:#bdeee0}

</style></head><body>
<div class="note"><h1>Living character — single entity (full body)</h1>
<p><b>Move your mouse</b> across the screen — the whole figure leans toward it as one piece. Hold still to see it breathe.</p>
<span class="pill">One intact character · no separate parts · no seams</span></div>
<div class="floor"></div>

<div id="dot" class="dot"></div>

  var tex=new Image(), loaded=false;

  var TW=RIG.TW, TH=RIG.TH;

  cv.width=Math.round(TW*DPR); cv.height=Math.round(TH*DPR);

  var px=0.5, py=0.42, ax=0, ay=0, active=0;
